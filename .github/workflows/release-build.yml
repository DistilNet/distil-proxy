name: Release Build Validation

on:
  workflow_dispatch:
  pull_request:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
          - goos: windows
            goarch: arm64
            ext: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Build binaries
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -trimpath -o dist/distil-proxy-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} ./cmd/distil-proxy

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: distil-proxy-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
          path: dist/distil-proxy-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-matrix
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten release files
        run: |
          find dist -mindepth 2 -type f -name 'distil-proxy-*' -exec mv {} dist/ \;
          find dist -mindepth 1 -type d -empty -delete

      - name: Generate SHA256SUMS
        run: |
          cd dist
          shasum -a 256 distil-proxy-* > SHA256SUMS

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/distil-proxy-darwin-amd64
            dist/distil-proxy-darwin-arm64
            dist/distil-proxy-linux-amd64
            dist/distil-proxy-linux-arm64
            dist/distil-proxy-windows-amd64.exe
            dist/distil-proxy-windows-arm64.exe
            dist/SHA256SUMS
          generate_release_notes: true
