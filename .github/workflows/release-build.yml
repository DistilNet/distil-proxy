name: Release Build Validation

on:
  workflow_dispatch:
  pull_request:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
          - goos: windows
            goarch: arm64
            ext: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Build binaries
        run: |
          mkdir -p dist
          VERSION="$(git describe --tags --always --dirty 2>/dev/null | sed 's/^v//')"
          COMMIT="$(git rev-parse --short HEAD 2>/dev/null || echo none)"
          BUILD_DATE="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          LDFLAGS="-X github.com/distilnet/distil-proxy/internal/version.version=${VERSION} -X github.com/distilnet/distil-proxy/internal/version.commit=${COMMIT} -X github.com/distilnet/distil-proxy/internal/version.date=${BUILD_DATE}"
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -trimpath -ldflags "${LDFLAGS}" -o dist/distil-proxy-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} ./cmd/distil-proxy

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: distil-proxy-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
          path: dist/distil-proxy-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-matrix
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: distil-proxy-*
          merge-multiple: true
          path: dist

      - name: Generate SHA256SUMS
        run: |
          cd dist
          shopt -s nullglob
          files=(distil-proxy-*)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release binaries found in dist/"
            exit 1
          fi
          for f in "${files[@]}"; do
            if [ -d "$f" ]; then
              echo "Unexpected directory in release files: $f"
              exit 1
            fi
          done
          shasum -a 256 "${files[@]}" > SHA256SUMS

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/distil-proxy-darwin-amd64
            dist/distil-proxy-darwin-arm64
            dist/distil-proxy-linux-amd64
            dist/distil-proxy-linux-arm64
            dist/distil-proxy-windows-amd64.exe
            dist/distil-proxy-windows-arm64.exe
            dist/SHA256SUMS
          generate_release_notes: true
