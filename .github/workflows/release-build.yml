name: Release Build Validation

on:
  workflow_dispatch:
  pull_request:
  push:
    tags:
      - 'v*'

jobs:
  build-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Build binaries
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -trimpath -o dist/distil-proxy-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/distil-proxy

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: distil-proxy-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/distil-proxy-${{ matrix.goos }}-${{ matrix.goarch }}
